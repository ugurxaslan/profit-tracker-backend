#bu dizinde çalışacak

services:
  db:
    image: postgres:15-alpine
    container_name: profit-tracker-db
    restart: on-failure
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user
      POSTGRES_DB: profit-tracker-db
    ports:
      - "5432:5432"
    shm_size: 128mb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d profit-tracker-db"]
      interval: 5s
      timeout: 5s
      retries: 2

  adminer:
    image: adminer
    container_name: db-admin-gui
    restart: on-failure
    ports:
      - "8081:8080"
    depends_on:
      - db

volumes:
  postgres_data: